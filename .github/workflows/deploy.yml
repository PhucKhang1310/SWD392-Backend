name: CI/CD

on:
  push:
    branches:
      - node
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/taiduc1001/swd392-backend:node-latest
  CONTAINER_NAME: swd392-backend-node

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: node

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: taiduc1001
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}
            ghcr.io/taiduc1001/swd392-backend:node-${{ github.sha }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u taiduc1001 --password-stdin
            docker pull ${{ env.IMAGE_NAME }}

            docker rm -f ${{ env.CONTAINER_NAME }} || true

            ENV_FILE=~/swd392-backend/.env
            RUN_ARGS="-d --name ${{ env.CONTAINER_NAME }} --restart always -p 3000:3000 -v ~/swd392-backend/uploads:/app/uploads"

            if [ -f "$ENV_FILE" ]; then
              RUN_ARGS="$RUN_ARGS --env-file $ENV_FILE"
            fi

            docker run $RUN_ARGS ${{ env.IMAGE_NAME }}

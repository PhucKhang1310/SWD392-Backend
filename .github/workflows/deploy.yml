name: CI/CD

on:
  push:
    branches:
      - node
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/taiduc1001/swd392-backend:latest
  CONTAINER_NAME: swd392-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: node

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: taiduc1001
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}
            ghcr.io/taiduc1001/swd392-backend:node-${{ github.sha }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u taiduc1001 --password-stdin
            docker pull ${{ env.IMAGE_NAME }}

            docker rm -f ${{ env.CONTAINER_NAME }} swd392-backend-node swd392-backend-app-1 >/dev/null 2>&1 || true

            APP_DIR="$HOME/swd392-backend"
            UPLOAD_DIR="$APP_DIR/uploads"
            ENV_FILE="$APP_DIR/.env"
            mkdir -p "$UPLOAD_DIR"

            if [ -f "$ENV_FILE" ]; then
              docker run -d --name ${{ env.CONTAINER_NAME }} --restart always -p 8080:8080 -e PORT=8080 -v "$UPLOAD_DIR:/app/uploads" --env-file "$ENV_FILE" ${{ env.IMAGE_NAME }}
            else
              docker run -d --name ${{ env.CONTAINER_NAME }} --restart always -p 8080:8080 -e PORT=8080 -v "$UPLOAD_DIR:/app/uploads" ${{ env.IMAGE_NAME }}
            fi
